<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Moments - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript"
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5cf4c8b79dd2313ca1ea8cb8f962af6c&autoload=false"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <div class="header-title-area">
                    <h1>Our Moments</h1>
                    <div class="anniversary-badge" id="anniversary-header-display">
                        <span id="anniversary-date-text">YYYY.MM.DD ~</span>
                        <span class="d-day" id="d-day-count">D+0</span>
                        <button class="edit-date-btn" onclick="toggleDateEdit()">
                            <i data-lucide="edit-3" style="width: 12px; height: 12px;"></i>
                        </button>
                    </div>
                    <!-- Date Edit Input (Hidden by default) -->
                    <div id="date-edit-controls" class="hidden" style="margin-top: 8px; display: flex; gap: 4px;">
                        <input type="date" id="new-start-date"
                            style="padding: 4px 8px; font-size: 12px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1);">
                        <button onclick="saveStartDate()" class="primary-btn"
                            style="padding: 4px 12px; font-size: 12px;">Save</button>
                    </div>
                </div>
                <div class="header-profile" style="display: flex; align-items: center; gap: 8px;">
                    <div class="avatars-group"
                        style="display: flex; -webkit-mask-image: linear-gradient(to right, black 80%, transparent 100%); mask-image: linear-gradient(to right, black 80%, transparent 100%);">
                        <img src="" alt="User 1" class="avatar" id="avatar-1" onclick="openProfileModal('me')"
                            style="margin-right: -10px; position: relative; z-index: 2; cursor: pointer;">
                        <img src="" alt="User 2" class="avatar" id="avatar-2" onclick="openProfileModal('partner')"
                            style="position: relative; z-index: 1; cursor: pointer;">
                    </div>
                    <button onclick="logout()" class="logout-btn" title="Logout">
                        <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Map View (GPS Tagging) -->
            <section id="view-map" class="view active">
                <div class="glass-card map-card">
                    <div id="kakao-map" style="width:100%; height:300px; border-radius: 16px;"></div>
                </div>

                <div class="glass-card action-card">
                    <h2>Live Tracking</h2>
                    <p id="gps-status-text" class="mt-3 text-muted" style="font-size: 14px;">Initializing GPS...</p>
                    <div style="font-size: 12px; margin-top: 8px; color: var(--text-muted);">
                        * The app automatically tags a place if you stay within 50m for more than 3 minutes.
                    </div>
                </div>

                <div class="recent-tags mt-4">
                    <h3>Recent Memories</h3>
                    <div id="timeline-list" class="timeline"></div>
                </div>
            </section>

            <!-- Calendar View -->
            <section id="view-calendar" class="view hidden">
                <div class="glass-card calendar-card">
                    <div class="calendar-header">
                        <button class="icon-btn" onclick="changeMonth(-1)"><i data-lucide="chevron-left"></i></button>
                        <h2 id="calendar-month-year">May 2026</h2>
                        <button class="icon-btn" onclick="changeMonth(1)"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <div class="calendar-grid-header">
                        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                    </div>
                    <div id="calendar-grid" class="calendar-grid"></div>
                </div>

                <!-- Selected Date Info (RESTORED) -->
                <div class="glass-card mt-4 date-details" id="date-details">
                    <h3 id="selected-date-title">Select a date</h3>
                    <div id="schedule-list" class="schedule-list mt-3">
                        <!-- Inline schedule list -->
                        <p class="empty-state">일정이 없습니다.</p>
                    </div>
                    <button class="primary-btn mt-4 w-full" onclick="showAddForm(true)">
                        <i data-lucide="plus"></i> 일정 추가
                    </button>
                </div>
            </section>
        </main>

        <!-- Modal (Schedule Manager) -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="glass-card modal">
                <div class="modal-header">
                    <h3 id="modal-date-title">Date</h3>
                    <button class="icon-btn" onclick="closeModal()"><i data-lucide="x"></i></button>
                </div>

                <!-- Modal Body (Form Only) -->
                <div id="modal-form-view" class="mt-3">
                    <div class="modal-body">
                        <input type="hidden" id="edit-schedule-id">
                        <div class="form-group">
                            <label style="font-size: 13px; color: var(--text-muted);">제목</label>
                            <input type="text" id="schedule-title" placeholder="제목을 입력하세요">
                        </div>
                        <div class="form-group mt-3">
                            <label style="font-size: 13px; color: var(--text-muted);">내용</label>
                            <textarea id="schedule-description" placeholder="상세 내용을 입력하세요" rows="3"
                                style="width: 100%; resize: vertical; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; font-size: 14px;"></textarea>
                        </div>
                        <div class="form-group mt-3">
                            <label style="font-size: 13px; color: var(--text-muted);">시간</label>
                            <input type="time" id="schedule-time">
                        </div>
                        <div class="form-group mt-3">
                            <label style="font-size: 13px; color: var(--text-muted);">장소 연결</label>
                            <div style="display: flex; gap: 8px; align-items: center;">
                                <div id="linked-place" style="flex: 1; font-size: 14px; color: var(--text-muted);">연결된
                                    장소 없음</div>
                                <button class="text-btn" onclick="linkPlace()">최근 장소 연결</button>
                            </div>
                        </div>
                        <div class="form-group mt-3">
                            <label
                                style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px;">
                                <input type="checkbox" id="schedule-annual"
                                    style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                                <span>매년 반복</span>
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer mt-4">
                        <button class="primary-btn w-full" onclick="saveSchedule()">일정 저장</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Profile Modal -->
        <div id="profile-modal-overlay" class="modal-overlay hidden"
            onclick="if(event.target===this)closeProfileModal()">
            <div class="glass-card modal" style="max-width: 300px; padding: 20px;">
                <div class="modal-header" style="margin-bottom: 12px;">
                    <h3 style="font-size: 16px;" id="profile-modal-title">프로필</h3>
                    <button class="icon-btn" onclick="closeProfileModal()"><i data-lucide="x"></i></button>
                </div>
                <div
                    style="background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(78,205,196,0.1)); border-radius: 14px; padding: 14px; text-align: center;">
                    <img id="profile-avatar" src=""
                        style="width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--primary-color); margin-bottom: 8px;">
                    <div id="profile-name" style="font-size: 16px; font-weight: 700; margin-bottom: 4px;"></div>
                    <div id="profile-username" style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
                        @username</div>
                    <div id="profile-birthday" style="font-size: 13px;"></div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass-nav">
            <button class="nav-item active" onclick="switchView('map')" id="nav-map">
                <i data-lucide="map"></i>
                <span>Map</span>
            </button>
            <button class="nav-item" onclick="switchView('calendar')" id="nav-calendar">
                <i data-lucide="calendar-heart"></i>
                <span>Calendar</span>
            </button>
        </nav>
    </div>

    <script src="../auth.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
